<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)" rx="16"/>

  <!-- Decorative grid dots -->
  <g opacity="0.08" fill="#58a6ff">
    <circle cx="50" cy="50" r="2"/><circle cx="100" cy="50" r="2"/><circle cx="150" cy="50" r="2"/><circle cx="200" cy="50" r="2"/><circle cx="250" cy="50" r="2"/><circle cx="300" cy="50" r="2"/>
    <circle cx="50" cy="100" r="2"/><circle cx="100" cy="100" r="2"/><circle cx="150" cy="100" r="2"/><circle cx="200" cy="100" r="2"/><circle cx="250" cy="100" r="2"/><circle cx="300" cy="100" r="2"/>
    <circle cx="600" cy="200" r="2"/><circle cx="650" cy="200" r="2"/><circle cx="700" cy="200" r="2"/><circle cx="750" cy="200" r="2"/><circle cx="800" cy="200" r="2"/><circle cx="850" cy="200" r="2"/>
    <circle cx="600" cy="250" r="2"/><circle cx="650" cy="250" r="2"/><circle cx="700" cy="250" r="2"/><circle cx="750" cy="250" r="2"/><circle cx="800" cy="250" r="2"/><circle cx="850" cy="250" r="2"/>
  </g>

  <!-- Ghost CMS official-style logo (centered, left of connector) -->
  <g transform="translate(385, 28) scale(0.52)">
    <!-- Ghost body: rounded dome top, wavy bottom -->
    <path d="M50 0C22.4 0 0 22.4 0 50v45c0 3.5 4.2 5.3 6.7 2.8l7.8-7.8c2-2 5.2-2 7.2 0l6.3 6.3c2 2 5.2 2 7.2 0l6.3-6.3c2-2 5.2-2 7.2 0l6.3 6.3c2 2 5.2 2 7.2 0l6.3-6.3c2-2 5.2-2 7.2 0l7.8 7.8c2.5 2.5 6.7.7 6.7-2.8V50C100 22.4 77.6 0 50 0z" fill="#58a6ff" opacity="0.95"/>
    <!-- Eyes -->
    <circle cx="35" cy="48" r="10" fill="#0d1117"/>
    <circle cx="65" cy="48" r="10" fill="#0d1117"/>
    <!-- Eye highlights -->
    <circle cx="38" cy="45" r="3" fill="#58a6ff" opacity="0.4"/>
    <circle cx="68" cy="45" r="3" fill="#58a6ff" opacity="0.4"/>
  </g>

  <!-- Connector arrow -->
  <g transform="translate(443, 58)">
    <line x1="0" y1="0" x2="14" y2="0" stroke="#8b949e" stroke-width="2" stroke-linecap="round"/>
    <polyline points="10,-4 14,0 10,4" stroke="#8b949e" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- GitHub Octomark (centered, right of connector) -->
  <g transform="translate(462, 33) scale(0.48)">
    <path d="M50 0C22.4 0 0 22.4 0 50c0 22.1 14.3 40.8 34.2 47.4 2.5.5 3.4-1.1 3.4-2.4v-8.5C23.7 89.5 20.8 80 20.8 80c-2.3-5.7-5.5-7.3-5.5-7.3-4.5-3.1.3-3 .3-3 5 .3 7.6 5.1 7.6 5.1 4.4 7.6 11.6 5.4 14.4 4.1.4-3.2 1.7-5.4 3.1-6.6-11.1-1.3-22.8-5.6-22.8-24.7 0-5.5 2-9.9 5.1-13.4-.5-1.3-2.2-6.4.5-13.3 0 0 4.2-1.3 13.7 5.1 4-1.1 8.3-1.7 12.5-1.7s8.5.6 12.5 1.7c9.5-6.5 13.7-5.1 13.7-5.1 2.7 6.9 1 12 .5 13.3 3.2 3.5 5.1 8 5.1 13.4 0 19.2-11.7 23.4-22.8 24.6 1.8 1.5 3.4 4.6 3.4 9.3v13.8c0 1.3.9 2.9 3.4 2.4C85.7 90.8 100 72.1 100 50 100 22.4 77.6 0 50 0z" fill="#bc8cff" opacity="0.95"/>
  </g>

  <!-- Title -->
  <text x="450" y="145" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="white" letter-spacing="-1">
    ghost-github-portfolio
  </text>

  <!-- Subtitle -->
  <text x="450" y="180" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" fill="#8b949e">
    Auto-sync GitHub repos to your Ghost portfolio page
  </text>

  <!-- Feature pills -->
  <g transform="translate(450, 220)" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="500">
    <g transform="translate(-280, 0)">
      <rect x="-45" y="-14" width="90" height="28" rx="14" fill="#58a6ff" opacity="0.15"/>
      <text fill="#58a6ff" dy="5">Banners</text>
    </g>
    <g transform="translate(-160, 0)">
      <rect x="-42" y="-14" width="84" height="28" rx="14" fill="#58a6ff" opacity="0.15"/>
      <text fill="#58a6ff" dy="5">Badges</text>
    </g>
    <g transform="translate(-45, 0)">
      <rect x="-52" y="-14" width="104" height="28" rx="14" fill="#bc8cff" opacity="0.15"/>
      <text fill="#bc8cff" dy="5">Star Sort</text>
    </g>
    <g transform="translate(75, 0)">
      <rect x="-52" y="-14" width="104" height="28" rx="14" fill="#bc8cff" opacity="0.15"/>
      <text fill="#bc8cff" dy="5">Auto-Sync</text>
    </g>
    <g transform="translate(190, 0)">
      <rect x="-40" y="-14" width="80" height="28" rx="14" fill="#58a6ff" opacity="0.15"/>
      <text fill="#58a6ff" dy="5">Docker</text>
    </g>
    <g transform="translate(290, 0)">
      <rect x="-55" y="-14" width="110" height="28" rx="14" fill="#58a6ff" opacity="0.15"/>
      <text fill="#58a6ff" dy="5">GH Action</text>
    </g>
  </g>

  <!-- Bottom accent line -->
  <rect x="100" y="270" width="700" height="2" rx="1" fill="url(#accent)" opacity="0.3"/>
</svg>
