<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)" rx="16"/>

  <!-- Decorative grid dots -->
  <g opacity="0.08" fill="#58a6ff">
    <circle cx="50" cy="50" r="2"/><circle cx="100" cy="50" r="2"/><circle cx="150" cy="50" r="2"/><circle cx="200" cy="50" r="2"/><circle cx="250" cy="50" r="2"/><circle cx="300" cy="50" r="2"/>
    <circle cx="50" cy="100" r="2"/><circle cx="100" cy="100" r="2"/><circle cx="150" cy="100" r="2"/><circle cx="200" cy="100" r="2"/><circle cx="250" cy="100" r="2"/><circle cx="300" cy="100" r="2"/>
    <circle cx="600" cy="200" r="2"/><circle cx="650" cy="200" r="2"/><circle cx="700" cy="200" r="2"/><circle cx="750" cy="200" r="2"/><circle cx="800" cy="200" r="2"/><circle cx="850" cy="200" r="2"/>
    <circle cx="600" cy="250" r="2"/><circle cx="650" cy="250" r="2"/><circle cx="700" cy="250" r="2"/><circle cx="750" cy="250" r="2"/><circle cx="800" cy="250" r="2"/><circle cx="850" cy="250" r="2"/>
  </g>

  <!-- Ghost icon -->
  <g transform="translate(200, 90)">
    <path d="M30 0C13.4 0 0 13.4 0 30v50c0 5 4 8 8 5l8-6c3-2 7-2 10 0l8 6c3 2 7 2 10 0l8-6c3-2 7-2 10 0l8 6c4 3 8 0 8-5V30C78 13.4 64.6 0 48 0H30z" fill="url(#accent)" opacity="0.9"/>
    <circle cx="28" cy="35" r="8" fill="#0d1117"/>
    <circle cx="50" cy="35" r="8" fill="#0d1117"/>
  </g>

  <!-- GitHub icon -->
  <g transform="translate(295, 95)">
    <path d="M40 0C17.9 0 0 17.9 0 40c0 17.7 11.5 32.7 27.4 38 2 .4 2.7-.9 2.7-1.9v-6.7c-11.1 2.4-13.5-5.4-13.5-5.4-1.8-4.6-4.4-5.8-4.4-5.8-3.6-2.5.3-2.4.3-2.4 4 .3 6.1 4.1 6.1 4.1 3.6 6.1 9.4 4.3 11.7 3.3.4-2.6 1.4-4.3 2.5-5.3-8.9-1-18.2-4.4-18.2-19.8 0-4.4 1.6-8 4.1-10.8-.4-1-1.8-5.1.4-10.6 0 0 3.4-1.1 11 4.1 3.2-.9 6.6-1.3 10-1.3s6.8.5 10 1.3c7.6-5.2 11-4.1 11-4.1 2.2 5.5.8 9.6.4 10.6 2.6 2.8 4.1 6.4 4.1 10.8 0 15.4-9.4 18.8-18.3 19.8 1.4 1.2 2.7 3.7 2.7 7.4v11c0 1.1.7 2.3 2.7 1.9C68.5 72.7 80 57.7 80 40 80 17.9 62.1 0 40 0z" fill="url(#accent)" opacity="0.9"/>
  </g>

  <!-- Title -->
  <text x="450" y="125" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="white" letter-spacing="-1">
    ghost-github-portfolio
  </text>

  <!-- Subtitle -->
  <text x="450" y="165" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" fill="#8b949e">
    Auto-sync GitHub repos to your Ghost portfolio page
  </text>

  <!-- Feature pills -->
  <g transform="translate(450, 200)" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="500">
    <g transform="translate(-280, 0)">
      <rect x="-45" y="-14" width="90" height="28" rx="14" fill="#58a6ff" opacity="0.15"/>
      <text fill="#58a6ff" dy="5">Banners</text>
    </g>
    <g transform="translate(-160, 0)">
      <rect x="-42" y="-14" width="84" height="28" rx="14" fill="#58a6ff" opacity="0.15"/>
      <text fill="#58a6ff" dy="5">Badges</text>
    </g>
    <g transform="translate(-45, 0)">
      <rect x="-52" y="-14" width="104" height="28" rx="14" fill="#bc8cff" opacity="0.15"/>
      <text fill="#bc8cff" dy="5">Star Sort</text>
    </g>
    <g transform="translate(75, 0)">
      <rect x="-52" y="-14" width="104" height="28" rx="14" fill="#bc8cff" opacity="0.15"/>
      <text fill="#bc8cff" dy="5">Auto-Sync</text>
    </g>
    <g transform="translate(190, 0)">
      <rect x="-40" y="-14" width="80" height="28" rx="14" fill="#58a6ff" opacity="0.15"/>
      <text fill="#58a6ff" dy="5">Docker</text>
    </g>
    <g transform="translate(290, 0)">
      <rect x="-55" y="-14" width="110" height="28" rx="14" fill="#58a6ff" opacity="0.15"/>
      <text fill="#58a6ff" dy="5">GH Action</text>
    </g>
  </g>

  <!-- Bottom accent line -->
  <rect x="100" y="260" width="700" height="2" rx="1" fill="url(#accent)" opacity="0.3"/>
</svg>
