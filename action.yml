name: "Ghost GitHub Portfolio"
description: "Auto-sync GitHub repositories to a Ghost CMS portfolio page"
author: "GeiserX"

branding:
  icon: "layout"
  color: "purple"

inputs:
  config-path:
    description: "Path to the config YAML file"
    required: false
    default: "config.yml"
  ghost-url:
    description: "Ghost blog URL (overrides config)"
    required: false
  ghost-admin-api-key:
    description: "Ghost Admin API key in KEY_ID:SECRET format"
    required: false
  ghost-page-slug:
    description: "Ghost page slug to update"
    required: false
  github-username:
    description: "GitHub username to fetch repos for"
    required: false
  min-stars:
    description: "Minimum stars to include a repo"
    required: false
    default: "2"

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: "22"

    - name: Install and build
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        npm ci
        npm run build

    - name: Generate config overrides
      shell: bash
      id: config
      run: |
        CONFIG="${{ inputs.config-path }}"
        if [ -n "${{ inputs.ghost-url }}" ] || [ -n "${{ inputs.ghost-page-slug }}" ] || [ -n "${{ inputs.github-username }}" ] || [ -n "${{ inputs.min-stars }}" ]; then
          cp "$CONFIG" /tmp/ggp-config.yml
          CONFIG=/tmp/ggp-config.yml
          if [ -n "${{ inputs.ghost-url }}" ]; then
            echo "Overriding ghost.url"
            node -e "
              const fs = require('fs');
              const yaml = require('yaml');
              const c = yaml.parse(fs.readFileSync('$CONFIG','utf8'));
              c.ghost = c.ghost || {};
              c.ghost.url = '${{ inputs.ghost-url }}';
              fs.writeFileSync('$CONFIG', yaml.stringify(c));
            "
          fi
          if [ -n "${{ inputs.ghost-page-slug }}" ]; then
            echo "Overriding ghost.pageSlug"
            node -e "
              const fs = require('fs');
              const yaml = require('yaml');
              const c = yaml.parse(fs.readFileSync('$CONFIG','utf8'));
              c.ghost = c.ghost || {};
              c.ghost.pageSlug = '${{ inputs.ghost-page-slug }}';
              fs.writeFileSync('$CONFIG', yaml.stringify(c));
            "
          fi
          if [ -n "${{ inputs.github-username }}" ]; then
            echo "Overriding github.username"
            node -e "
              const fs = require('fs');
              const yaml = require('yaml');
              const c = yaml.parse(fs.readFileSync('$CONFIG','utf8'));
              c.github = c.github || {};
              c.github.username = '${{ inputs.github-username }}';
              fs.writeFileSync('$CONFIG', yaml.stringify(c));
            "
          fi
          if [ -n "${{ inputs.min-stars }}" ]; then
            echo "Overriding portfolio.minStars"
            node -e "
              const fs = require('fs');
              const yaml = require('yaml');
              const c = yaml.parse(fs.readFileSync('$CONFIG','utf8'));
              c.portfolio = c.portfolio || {};
              c.portfolio.minStars = parseInt('${{ inputs.min-stars }}');
              fs.writeFileSync('$CONFIG', yaml.stringify(c));
            "
          fi
        fi
        echo "config=$CONFIG" >> "$GITHUB_OUTPUT"

    - name: Sync portfolio
      shell: bash
      env:
        GHOST_ADMIN_API_KEY: ${{ inputs.ghost-admin-api-key }}
        GHOST_GITHUB_TOKEN: ${{ github.token }}
      run: |
        node ${{ github.action_path }}/dist/index.js sync \
          --config "${{ steps.config.outputs.config }}" \
          --verbose
